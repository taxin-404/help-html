<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker শেখার সম্পূর্ণ গাইডবুক 🐳</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #060d1a;
        --bg-main: #0b1529;
        --bg-card: #0f1d35;
        --bg-card-hover: #142440;
        --bg-code: #080f1e;
        --bg-reader: #0d1a30;
        --border: #1a2d4f;
        --border-active: #2a4a7a;
        --text-primary: #e2eaf3;
        --text-secondary: #8a9fc0;
        --text-muted: #5a7099;
        --text-body: #c5d3e8;
        --docker-blue: #0db7ed;
        --accent-cyan: #4fc3f7;
        --accent-green: #66bb6a;
        --accent-yellow: #ffd54f;
        --accent-orange: #ffab40;
        --accent-red: #ef5350;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans Bengali", "Outfit", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        line-height: 1.75;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 0%,
            rgba(13, 183, 237, 0.07) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 85% 100%,
            rgba(30, 144, 255, 0.05) 0%,
            transparent 55%
          );
        pointer-events: none;
        z-index: 0;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 32px 18px;
        position: relative;
        z-index: 1;
      }

      /* HEADER */
      .header {
        text-align: center;
        margin-bottom: 36px;
        animation: fadeDown 0.7s ease;
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .whale {
        font-size: 52px;
        display: block;
        margin-bottom: 10px;
        animation: swim 4s ease-in-out infinite;
      }
      @keyframes swim {
        0%,
        100% {
          transform: translateY(0) rotate(0);
        }
        25% {
          transform: translateY(-6px) rotate(-2deg);
        }
        75% {
          transform: translateY(3px) rotate(1deg);
        }
      }
      .header h1 {
        font-family: "Outfit", "Noto Sans Bengali", sans-serif;
        font-size: 30px;
        font-weight: 800;
        background: linear-gradient(135deg, #0db7ed, #4fc3f7, #81d4fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header .sub {
        color: var(--text-muted);
        font-size: 14px;
        margin-top: 5px;
      }
      .header .badge {
        display: inline-block;
        margin-top: 10px;
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(13, 183, 237, 0.12);
        color: var(--accent-cyan);
        border: 1px solid rgba(13, 183, 237, 0.25);
      }

      /* PROGRESS */
      .progress-box {
        max-width: 460px;
        margin: 20px auto 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
      }
      .progress-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .progress-row .done {
        color: var(--accent-cyan);
        font-weight: 600;
      }
      .pbar {
        background: var(--bg-deep);
        border-radius: 10px;
        height: 10px;
        overflow: hidden;
      }
      .pfill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0db7ed, #4fc3f7);
        border-radius: 10px;
        transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 0 12px rgba(13, 183, 237, 0.35);
      }

      /* PHASE */
      .phase {
        margin-bottom: 34px;
      }
      .phase-head {
        display: flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 14px;
      }
      .phase-ico {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 21px;
        flex-shrink: 0;
        border: 2px solid;
      }
      .phase-lbl {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      .phase-ttl {
        font-size: 18px;
        font-weight: 700;
      }

      /* TIMELINE */
      .timeline {
        margin-left: 23px;
        padding-left: 28px;
        border-left: 2px solid;
      }

      /* TOPIC CARD */
      .tcard {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 13px;
        padding: 14px 16px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .tcard:hover {
        background: var(--bg-card-hover);
        border-color: var(--border-active);
        transform: translateX(2px);
      }
      .tcard.open {
        border-color: var(--border-active);
        background: var(--bg-card-hover);
      }
      .tcard::before {
        content: "";
        position: absolute;
        left: -35px;
        top: 18px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid;
        background: var(--bg-deep);
        transition: all 0.3s;
      }
      .tcard.done::before {
        box-shadow: 0 0 8px;
      }
      .ttop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .tleft {
        display: flex;
        align-items: center;
        gap: 9px;
        flex: 1;
        min-width: 0;
      }
      .tnum {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 5px;
        flex-shrink: 0;
      }
      .tname {
        font-weight: 600;
        font-size: 14.5px;
        transition: opacity 0.3s;
      }
      .tcard.done .tname {
        text-decoration: line-through;
        opacity: 0.45;
      }
      .tright {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .readbtn {
        padding: 4px 12px;
        border-radius: 7px;
        border: 1px solid;
        background: transparent;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Noto Sans Bengali", sans-serif;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .readbtn:hover {
        filter: brightness(1.3);
      }
      .chkbtn {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: 2px solid;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        color: inherit;
        padding: 0;
      }
      .chkbtn.on {
        color: #fff;
      }
      .arr {
        color: var(--text-muted);
        font-size: 15px;
        transition: transform 0.2s;
        user-select: none;
      }
      .tcard.open .arr {
        transform: rotate(180deg);
      }

      /* MINI DETAILS */
      .tdetails {
        display: none;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .tcard.open .tdetails {
        display: block;
        animation: slideD 0.3s ease;
      }
      @keyframes slideD {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .dlabel {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .ditem {
        padding: 5px 0 5px 16px;
        font-size: 13px;
        color: #a8bcd5;
        border-left: 2px solid;
        margin-bottom: 2px;
      }
      .clabel {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
        margin: 14px 0 6px;
      }
      .cblock {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 12px 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--accent-cyan);
        line-height: 1.7;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        position: relative;
      }
      .cpbtn {
        position: absolute;
        top: 7px;
        right: 7px;
        background: rgba(79, 195, 247, 0.1);
        border: 1px solid rgba(79, 195, 247, 0.2);
        color: var(--accent-cyan);
        font-size: 10px;
        padding: 3px 9px;
        border-radius: 5px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        transition: all 0.2s;
      }
      .cpbtn:hover {
        background: rgba(79, 195, 247, 0.2);
      }

      /* ========== READER OVERLAY ========== */
      .reader-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(4, 8, 18, 0.85);
        backdrop-filter: blur(8px);
        animation: fadeIn 0.3s;
      }
      .reader-overlay.active {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
        overflow-y: auto;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .reader-panel {
        background: var(--bg-reader);
        border: 1px solid var(--border-active);
        border-radius: 18px;
        max-width: 720px;
        width: 100%;
        margin: 20px auto;
        padding: 0;
        animation: slideUp 0.4s ease;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(13, 183, 237, 0.08);
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reader-header {
        padding: 20px 24px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .reader-header .rh-left {
        flex: 1;
      }
      .reader-header .rh-phase {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .reader-header .rh-title {
        font-size: 20px;
        font-weight: 700;
      }
      .reader-header .rh-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 6px;
      }
      .close-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .close-btn:hover {
        background: var(--accent-red);
        color: #fff;
        border-color: var(--accent-red);
      }

      .reader-body {
        padding: 24px;
      }

      /* Reader content styles */
      .r-section {
        margin-bottom: 24px;
      }
      .r-section:last-child {
        margin-bottom: 0;
      }
      .r-h2 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .r-h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
        margin: 14px 0 8px;
      }
      .r-p {
        font-size: 14px;
        color: var(--text-body);
        line-height: 1.85;
        margin-bottom: 10px;
      }
      .r-ul {
        margin: 8px 0 12px 20px;
      }
      .r-ul li {
        font-size: 13.5px;
        color: var(--text-body);
        margin-bottom: 5px;
        line-height: 1.7;
      }
      .r-note {
        background: rgba(255, 213, 79, 0.06);
        border-left: 3px solid var(--accent-yellow);
        padding: 10px 14px;
        border-radius: 0 8px 8px 0;
        margin: 12px 0;
        font-size: 13px;
        color: #ddd;
      }
      .r-tip {
        background: rgba(102, 187, 106, 0.06);
        border-left: 3px solid var(--accent-green);
        padding: 10px 14px;
        border-radius: 0 8px 8px 0;
        margin: 12px 0;
        font-size: 13px;
        color: #ddd;
      }
      .r-warn {
        background: rgba(239, 83, 80, 0.06);
        border-left: 3px solid var(--accent-red);
        padding: 10px 14px;
        border-radius: 0 8px 8px 0;
        margin: 12px 0;
        font-size: 13px;
        color: #ddd;
      }
      .r-code {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 14px 16px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12.5px;
        color: var(--accent-cyan);
        line-height: 1.7;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin: 10px 0;
        position: relative;
      }
      .r-code .cpbtn {
        top: 6px;
        right: 6px;
      }
      .r-comment {
        color: #5a7a5a;
      }
      .r-output {
        color: #888;
        font-style: italic;
      }
      .r-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }

      .reader-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .nav-btn {
        padding: 8px 18px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Noto Sans Bengali", sans-serif;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nav-btn:hover {
        background: var(--bg-card-hover);
        border-color: var(--border-active);
        color: var(--text-primary);
      }
      .nav-btn.primary {
        background: rgba(13, 183, 237, 0.12);
        border-color: rgba(13, 183, 237, 0.3);
        color: var(--accent-cyan);
      }
      .nav-btn.primary:hover {
        background: rgba(13, 183, 237, 0.22);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        margin-top: 44px;
        padding: 22px 0;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.9;
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-deep);
      }
      ::-webkit-scrollbar-thumb {
        background: #1a2d4f;
        border-radius: 3px;
      }

      /* RESPONSIVE */
      @media (max-width: 600px) {
        .container {
          padding: 18px 12px;
        }
        .header h1 {
          font-size: 23px;
        }
        .phase-ttl {
          font-size: 15.5px;
        }
        .tname {
          font-size: 13px;
        }
        .timeline {
          margin-left: 18px;
          padding-left: 22px;
        }
        .tcard::before {
          left: -29px;
          width: 10px;
          height: 10px;
        }
        .reader-panel {
          margin: 10px;
          border-radius: 14px;
        }
        .reader-header {
          padding: 16px 18px 14px;
        }
        .reader-body {
          padding: 18px;
        }
        .reader-header .rh-title {
          font-size: 17px;
        }
        .readbtn {
          padding: 3px 8px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <span class="whale">🐳</span>
        <h1>Docker শেখার সম্পূর্ণ গাইডবুক</h1>
        <p class="sub">শূন্য থেকে প্রো — সহজ বাংলায় বিস্তারিত ব্যাখ্যা সহ</p>
        <span class="badge">📖 ২৫টি টপিক · ৯টি ফেজ · সম্পূর্ণ টিউটোরিয়াল</span>
        <div class="progress-box">
          <div class="progress-row">
            <span>অগ্রগতি</span>
            <span class="done" id="pText">0/25 সম্পন্ন (0%)</span>
          </div>
          <div class="pbar"><div class="pfill" id="pFill"></div></div>
        </div>
      </div>
      <div id="roadmap"></div>
      <div class="footer">
        🎯 টিপস: প্রতিটি টপিক হাতে-কলমে প্র্যাক্টিস করো। "📖 পড়ুন" বাটনে ক্লিক
        করে বিস্তারিত শিখো।<br />
        শেষ করলে ✓ মার্ক করো — তোমার অগ্রগতি সেভ থাকবে!
      </div>
    </div>

    <!-- READER OVERLAY -->
    <div class="reader-overlay" id="readerOverlay">
      <div class="reader-panel" id="readerPanel"></div>
    </div>

    <script>
      // ======================== DATA ========================

      const TOPICS = [

        {

          points: [
            "Docker কী? — containerization platform",

            "Docker Architecture",
            "Docker Engine কীভাবে কাজ করে",
          ],
          cmd: "docker --version",
          tutorial: `
<div class="r-section">
  <div class="r-h2">🤔 Docker কী?</div>
  <p class="r-p">Docker হলো একটি <b>containerization platform</b> — মানে এটা তোমার অ্যাপ্লিকেশনকে একটা "বাক্সে" (container) ভরে দেয়। এই বাক্সের ভিতরে অ্যাপ চালানোর জন্য যা যা দরকার — কোড, লাইব্রেরি, সেটিংস — সব থাকে।</p>

<div class="r-section">

  <p class="r-p"><b>Virtual Machine (VM)</b> মানে পুরো একটা আলাদা অপারেটিং সিস্টেম চালানো — যেটা অনেক ভারী (GBs মেমরি লাগে, চালু হতে মিনিট খায়)।</p>
  <p class="r-p"><b>Container</b> মানে শুধু অ্যাপ আর তার dependency — OS শেয়ার করে। তাই অনেক হালকা (MBs), সেকেন্ডে চালু হয়।</p>
  <div class="r-code">VM:  [তোমার অ্যাপ] + [পুরো OS] + [ভার্চুয়াল হার্ডওয়্যার]  → ভারী, ধীর
Container: [তোমার অ্যাপ] + [শুধু dependency]                → হালকা, দ্রুত</div>
</div>
<div class="r-section">

    <li><b>Docker Client</b> — তুমি যখন <code>docker run</code> লেখো, এটাই Client। তোমার কমান্ড নেয়।</li>
    <li><b>Docker Daemon (dockerd)</b> — এটা ব্যাকগ্রাউন্ডে চলে, container তৈরি করে, manage করে।</li>
    <li><b>Docker Registry (Hub)</b> — এখানে images জমা থাকে। যেমন Docker Hub = images এর "App Store"।</li>

      - uses: actions/checkout@v4

      <span class="r-comment"># ২. Docker Hub এ login করো</span>
      - uses: docker/login-action@v3
        with:
          username: \${{ secrets.DOCKER_USERNAME }}
          password: \${{ secrets.DOCKER_PASSWORD }}

      <span class="r-comment"># ৩. Image build এবং push করো</span>
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: username/my-app:latest</div>
  <div class="r-note">💡 GitHub repository এর Settings → Secrets এ DOCKER_USERNAME ও DOCKER_PASSWORD যোগ করো।</div>
  <div class="r-tip">✅ Best Practice: CI/CD pipeline এ Docker layer caching enable করো — build time অনেক কমবে!</div>
</div>
<div class="r-section">
  <div class="r-h2">🎉 অভিনন্দন!</div>
  <p class="r-p">তুমি Docker এর সম্পূর্ণ roadmap শেষ করেছো! এখন তুমি জানো:</p>
  <ul class="r-ul">
    <li>Container তৈরি ও manage করা</li>
    <li>Dockerfile লেখা ও image build করা</li>
    <li>Docker Compose দিয়ে multi-container app চালানো</li>
    <li>Networking, Volumes, Security</li>
    <li>Production best practices</li>
    <li>CI/CD তে Docker ব্যবহার</li>
  </ul>
  <p class="r-p">পরবর্তী ধাপ: <b>Kubernetes</b> গভীরভাবে শেখো এবং real project এ Docker ব্যবহার করো! 🚀</p>
</div>`,
        },
      ];

      // ======================== STATE ========================
      let completed = {};
      try {
        completed = JSON.parse(localStorage.getItem("docker_done2") || "{}");
      } catch (e) {}
      let expandedId = null;

      function save() {
        localStorage.setItem("docker_done2", JSON.stringify(completed));
      }
      function updateProgress() {
        const done = Object.values(completed).filter(Boolean).length;
        const pct = Math.round((done / 25) * 100);
        document.getElementById("pText").textContent =
          `${done}/25 সম্পন্ন (${pct}%)`;
        document.getElementById("pFill").style.width = pct + "%";
      }

      function toggleExpand(id) {
        expandedId = expandedId === id ? null : id;
        render();
      }
      function toggleCheck(id, e) {
        e.stopPropagation();
        completed[id] = !completed[id];
        save();
        render();
      }

      function copyCmd(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = "✓ কপি হয়েছে";
          setTimeout(() => (btn.textContent = "কপি"), 1200);
        });
      }

      // ======================== READER ========================
      function openReader(id) {
        event.stopPropagation();
        const t = TOPICS.find((x) => x.id === id);
        const ph = PHASES[t.phase];
        const prevT = TOPICS.find((x) => x.id === id - 1);
        const nextT = TOPICS.find((x) => x.id === id + 1);

        document.getElementById("readerPanel").innerHTML = `
    <div class="reader-header">
      <div class="rh-left">
        <div class="rh-phase" style="color:${ph.color}">${ph.phase} — ${ph.title}</div>
        <div class="rh-title">${t.name}</div>
      </div>
      <span class="rh-num" style="background:${ph.color}22;color:${ph.color}">#${t.id}</span>
      <button class="close-btn" onclick="closeReader()">✕</button>
    </div>
    <div class="reader-body">${t.tutorial}</div>
    <div class="reader-footer">
      <button class="nav-btn" onclick="openReaderById(${id - 1})" ${!prevT ? "disabled" : ""}>← আগের টপিক</button>
      <button class="nav-btn primary" onclick="closeReader()">বন্ধ করুন</button>
      <button class="nav-btn" onclick="openReaderById(${id + 1})" ${!nextT ? "disabled" : ""}>পরের টপিক →</button>
    </div>
  `;
        const overlay = document.getElementById("readerOverlay");
        overlay.classList.add("active");
        overlay.scrollTop = 0;
        document.body.style.overflow = "hidden";
      }

      function openReaderById(id) {
        if (id < 1 || id > 25) return;
        openReader(id);
      }

      function closeReader() {
        document.getElementById("readerOverlay").classList.remove("active");
        document.body.style.overflow = "";
      }

      document
        .getElementById("readerOverlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeReader();
        });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeReader();
      });

      // ======================== RENDER ========================
      function render() {
        const el = document.getElementById("roadmap");
        el.innerHTML = "";
        let phaseIdx = -1;
        let currentDiv = null;
        let timelineDiv = null;

        TOPICS.forEach((t) => {
          if (t.phase !== phaseIdx) {
            phaseIdx = t.phase;
            const ph = PHASES[phaseIdx];
            currentDiv = document.createElement("div");
            currentDiv.className = "phase";
            currentDiv.innerHTML = `
        <div class="phase-head">
          <div class="phase-ico" style="background:${ph.color}12;border-color:${ph.color}">${ph.icon}</div>
          <div>
            <div class="phase-lbl" style="color:${ph.color}">${ph.phase}</div>
            <div class="phase-ttl">${ph.title}</div>
          </div>
        </div>
      `;
            timelineDiv = document.createElement("div");
            timelineDiv.className = "timeline";
            timelineDiv.style.borderColor = ph.color + "22";
            currentDiv.appendChild(timelineDiv);
            el.appendChild(currentDiv);
          }

          const ph = PHASES[t.phase];
          const isOpen = expandedId === t.id;
          const isDone = !!completed[t.id];

          let pointsHTML = "";
          t.points.forEach((p) => {
            pointsHTML += `<div class="ditem" style="border-color:${ph.color}33">${p}</div>`;
          });

          const card = document.createElement("div");
          card.className = `tcard ${isOpen ? "open" : ""} ${isDone ? "done" : ""}`;
          card.onclick = () => toggleExpand(t.id);
          card.innerHTML = `
      <style>
        .tcard:nth-child(${t.id - TOPICS.filter((x) => x.phase < t.phase).length})::before { border-color:${ph.color}; }
        ${isDone ? `.tcard.done:nth-child(${t.id - TOPICS.filter((x) => x.phase < t.phase).length})::before { background:${ph.color}; box-shadow:0 0 8px ${ph.color}; }` : ""}
      </style>
      <div class="ttop">
        <div class="tleft">
          <span class="tnum" style="background:${ph.color}22;color:${ph.color}">#${t.id}</span>
          <span class="tname">${t.name}</span>
        </div>
        <div class="tright">
          <button class="readbtn" style="border-color:${ph.color}55;color:${ph.color}" onclick="openReader(${t.id})">📖 পড়ুন</button>
          <button class="chkbtn ${isDone ? "on" : ""}" style="border-color:${ph.color};${isDone ? "background:" + ph.color : ""}" onclick="toggleCheck(${t.id},event)">${isDone ? "✓" : ""}</button>
          <span class="arr">▾</span>
        </div>
      </div>
      <div class="tdetails">
        <div class="dlabel">📋 মূল বিষয়:</div>
        ${pointsHTML}
        <div class="clabel">💻 কমান্ড / কোড:</div>
        <div class="cblock"><button class="cpbtn" onclick="event.stopPropagation();copyCmd(\`${t.cmd.replace(/`/g, "\\`")}\`,this)">কপি</button>${t.cmd}</div>
      </div>
    `;
          timelineDiv.appendChild(card);
        });

        updateProgress();
      }

      render();
    </script>
  </body>
</html>
